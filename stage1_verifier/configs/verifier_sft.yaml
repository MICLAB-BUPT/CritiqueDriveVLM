### CritiqueDriveVLM - Stage 1: SFT of the multi-dimensional Verifier (LLaMA-Factory)
### Trains a frozen judge that scores perception / logic / safety (+ critique).
### Run: llamafactory-cli train configs/verifier_sft.yaml

### model
model_name_or_path: /path/to/models/Qwen3-VL-8B-Instruct   # verifier is a separate base model
image_max_pixels: 1003520
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all
freeze_vision_tower: true
freeze_trainable_layers: 0

### dataset
# Register `verifier` in data/dataset_info.json first (see dataset_info_snippet.json).
# This is the curated verifier dataset (GT positives + hard negatives). It MUST
# contain both the scores AND a natural-language critique, because Stage-2 RL reads
# the critique from the verifier. (data_construction/ documents how it was built.)
dataset: verifier
template: qwen3_vl
cutoff_len: 8192
overwrite_cache: false
preprocessing_num_workers: 16

### output
output_dir: /path/to/models/Qwen3-VL-8B-verifier/lora
logging_steps: 5
save_steps: 100
save_total_limit: 3
plot_loss: false
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
